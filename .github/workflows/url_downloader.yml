name: دانلودر لینک مستقیم

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل مورد نظر'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل فشرده (اختیاری؛ خالی = بدون رمز)'
        required: false
        type: string
        default: ''
      output_folder:
        description: 'پوشه ذخیره فایل و آرشیوها (نسبت به ریشه مخزن)'
        required: false
        type: string
        default: 'downloads'

permissions:
  contents: write

jobs:
  leech-split-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Create output folder
        run: mkdir -p "${{ inputs.output_folder }}"

      - name: Install 7z
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Download file
        id: download_file
        run: |
          curl -L --fail --retry 3 -o "${{ inputs.output_folder }}/downloaded_file" "${{ github.event.inputs.file_url }}"
          echo "File downloaded. Size: $(ls -lh "${{ inputs.output_folder }}/downloaded_file" | awk '{print $5}')"
          echo "downloaded_file_path=${{ inputs.output_folder }}/downloaded_file" >> $GITHUB_OUTPUT

      - name: Extract original filename and prepare for archive
        id: get_filename
        run: |
          DOWNLOADED_FILE="${{ steps.download_file.outputs.downloaded_file_path }}"
          ORIGINAL_URL="${{ github.event.inputs.file_url }}"
          
          FILENAME_FROM_URL=$(basename "$ORIGINAL_URL")
          if [[ -z "$FILENAME_FROM_URL" || "$FILENAME_FROM_URL" == "/" ]]; then
            FILENAME_FROM_URL="downloaded_file"
          fi
          
          FILENAME_BASE=$(echo "$FILENAME_FROM_URL" | sed 's/\.[^.]*$//' | cut -d '?' -f 1)
          FILENAME_EXT="${FILENAME_FROM_URL##*.}"
          
          if [[ "$FILENAME_BASE" == "$FILENAME_FROM_URL" ]]; then
            FILENAME_EXT=""
          fi
          
          ARCHIVE_PREFIX=""
          FULL_ARCHIVE_NAME="${ARCHIVE_PREFIX}${FILENAME_BASE}"
          
          MAX_TOTAL_LEN=50
          CURRENT_LEN=${#FULL_ARCHIVE_NAME}
          if [[ $CURRENT_LEN -gt $MAX_TOTAL_LEN ]]; then
            BASE_LEN_TO_KEEP=$((MAX_TOTAL_LEN - ${#ARCHIVE_PREFIX} - ${#FILENAME_EXT} - 1))
            if [[ $BASE_LEN_TO_KEEP -lt 1 ]]; then BASE_LEN_TO_KEEP=1; fi
            SHORT_FILENAME_BASE=$(echo "$FILENAME_BASE" | cut -c 1-$BASE_LEN_TO_KEEP)
            FULL_ARCHIVE_NAME="${ARCHIVE_PREFIX}${SHORT_FILENAME_BASE}"
          fi
          
          if [[ -n "$FILENAME_EXT" ]]; then
            FINAL_ARCHIVE_FILENAME="${FULL_ARCHIVE_NAME}.${FILENAME_EXT}"
          else
            FINAL_ARCHIVE_FILENAME="${FULL_ARCHIVE_NAME}"
          fi
          
          echo "Original file name: ${FILENAME_FROM_URL}"
          echo "Archive base name will be: ${FINAL_ARCHIVE_FILENAME}"
          
          echo "archive_base_name=${FULL_ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "downloaded_file_path=${DOWNLOADED_FILE}" >> $GITHUB_OUTPUT
          echo "file_extension=${FILENAME_EXT}" >> $GITHUB_OUTPUT
          echo "final_archive_name=${FINAL_ARCHIVE_FILENAME}" >> $GITHUB_OUTPUT

      - name: Rename downloaded file
        id: rename_file
        run: |
          ARCHIVE_NAME_PREFIX="${{ steps.get_filename.outputs.archive_base_name }}"
          DOWNLOADED_FILE="${{ steps.get_filename.outputs.downloaded_file_path }}"
          EXT="${{ steps.get_filename.outputs.file_extension }}"
          NEW_ORIGINAL_FILENAME="$ARCHIVE_NAME_PREFIX"
          if [[ -n "$EXT" ]]; then
            NEW_ORIGINAL_FILENAME="${ARCHIVE_NAME_PREFIX}.${EXT}"
          fi
          NEW_ORIGINAL_PATH="${{ inputs.output_folder }}/${NEW_ORIGINAL_FILENAME}"
          mv "$DOWNLOADED_FILE" "$NEW_ORIGINAL_PATH"
          echo "Renamed downloaded file to: $NEW_ORIGINAL_PATH"
          echo "new_original_filename=${NEW_ORIGINAL_FILENAME}" >> $GITHUB_OUTPUT
          echo "new_original_path=${NEW_ORIGINAL_PATH}" >> $GITHUB_OUTPUT

      - name: Generate timestamp for unique archive
        id: timestamp
        run: echo "value=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create split archive (with optional password)
        run: |
          ARCHIVE_NAME_PREFIX="${{ steps.get_filename.outputs.archive_base_name }}_${{ steps.timestamp.outputs.value }}"
          NEW_ORIGINAL_PATH="${{ steps.rename_file.outputs.new_original_path }}"
          PASS="${{ github.event.inputs.zip_password }}"
          cd "${{ inputs.output_folder }}"

          FILE="$(basename "$NEW_ORIGINAL_PATH")"
          if [ -n "$PASS" ]; then
            7z a -p"$PASS" -mhe=on -mx=3 -v85m "${ARCHIVE_NAME_PREFIX}.7z" "$FILE"
          else
            7z a -mx=3 -v85m "${ARCHIVE_NAME_PREFIX}.7z" "$FILE"
          fi

          # If only one part generated, rename it to .7z
          if [ -f "${ARCHIVE_NAME_PREFIX}.7z.001" ] && [ ! -f "${ARCHIVE_NAME_PREFIX}.7z.002" ]; then
            mv "${ARCHIVE_NAME_PREFIX}.7z.001" "${ARCHIVE_NAME_PREFIX}.7z"
            echo "Single chunk - renamed to .7z"
          fi

      - name: Remove original downloaded file
        run: |
          FILE="${{ steps.rename_file.outputs.new_original_path }}"
          if [[ -n "$FILE" && -f "$FILE" ]]; then
            rm "$FILE"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "Add file from ${{ github.event.inputs.file_url }} [skip ci]" || echo "No changes to commit"
          git push
